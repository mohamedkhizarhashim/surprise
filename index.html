<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You 💝</title>

<style>
body {
    margin: 0;
    font-family: 'Georgia', serif;
    background: linear-gradient(135deg, #fbeff5, #ffe3ec);
    overflow: hidden;
}

/* Center screens */
.screen {
    position: absolute;
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

/* Opening button */
.open-btn {
    padding: 15px 25px;
    font-size: 18px;
    border: none;
    border-radius: 30px;
    background: #ff4d88;
    color: white;
    cursor: pointer;
}

/* Card */
.card {
    display: none;
    background: white;
    padding: 25px;
    border-radius: 20px;
    width: 90%;
    max-width: 400px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    animation: fadeIn 1s ease forwards;
}

/* Fade animation */
@keyframes fadeIn {
    from { opacity: 0; transform: scale(0.9); }
    to { opacity: 1; transform: scale(1); }
}

/* Quote */
.quote {
    font-style: italic;
    margin: 15px 0;
}

/* Mirror */
.mirror {
    width: 100%;
    aspect-ratio: 1;
    border-radius: 15px;
    overflow: hidden;
    border: 3px solid #f8cdda;
    background: black;
}

video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transform: scaleX(-1);
    filter: blur(12px);
    transition: filter 2s ease;
}

/* Hearts */
.heart {
    position: absolute;
    color: #ff4d88;
    animation: float 6s linear infinite;
}

@keyframes float {
    from { transform: translateY(100vh) scale(0.5); }
    to { transform: translateY(-10vh) scale(1.2); }
}
</style>
</head>

<body>

<!-- OPEN SCREEN -->
<button type="button" class="open-btn" onclick="openGift()">
    Tap to open your gift 🎁
</button>

<!-- SETUP SCREEN -->
<div id="setupScreen" class="screen" style="display:none;">
    <input id="nameInput" placeholder="Enter your name" style="padding:10px; margin:10px; border-radius:10px; border:1px solid #ccc;">
    
    <select id="musicSelect" style="padding:10px; border-radius:10px;">
        <option value="">Choose music 🎵</option>
        <option value="song1">Romantic Piano</option>
        <option value="song2">Soft Love</option>
        <option value="song3">Dreamy Vibes</option>
    </select>

    <button type="button" class="open-btn" onclick="showCard()">
    Continue 💖
</button>
</div>

<!-- CARD -->
<div id="card" class="screen">
    <div class="card">
        <h2 id="title">A Little Gift 💝</h2>
        <div class="quote" contenteditable="true">
            "Sometimes, the most beautiful thing is right in front of you."
        </div>

        <div class="mirror">
            <video id="video" autoplay playsinline></video>
        </div>
    </div>
</div>

<audio id="music" loop></audio>

<script>
const video = document.getElementById('video');
const music = document.getElementById('music');

/* Step 1 */
function openGift() {
    document.getElementById('startScreen').style.display = "none";
    document.getElementById('setupScreen').style.display = "flex";
}

/* Step 2 */
function showCard() {
    const name = document.getElementById('nameInput').value || "Beautiful";
    const musicChoice = document.getElementById('musicSelect').value;

    document.getElementById('setupScreen').style.display = "none";
    document.getElementById('card').style.display = "flex";

    document.getElementById('title').innerText = "For " + name + " 💖";

    startCamera();
    playMusic(musicChoice);
    startHearts();
}

/* Camera */
async function startCamera() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: "user" }
        });
        video.srcObject = stream;

        setTimeout(() => {
            video.style.filter = "blur(0px)";
        }, 1500);

    } catch {
        alert("Please allow camera access 💝");
    }
}

/* Music */
function playMusic(choice) {
    if (choice === "song1") music.src = "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3";
    if (choice === "song2") music.src = "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3";
    if (choice === "song3") music.src = "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3";

    if (choice) music.play();
}

/* Hearts */
function startHearts() {
    setInterval(() => {
        const heart = document.createElement("div");
        heart.className = "heart";
        heart.innerHTML = "💖";
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.fontSize = (20 + Math.random() * 20) + "px";

        document.body.appendChild(heart);

        setTimeout(() => heart.remove(), 6000);
    }, 300);
}
</script>

</body>
</html>
