<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Aisha ❤️</title>

<style>
    body {
        margin: 0;
        padding: 0;
        font-family: serif;
        background: #f2f2f2;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        overflow: hidden;
    }

    .container {
        background: #fff;
        width: 90%;
        max-width: 400px;
        padding: 20px;
        border-radius: 20px;
        text-align: center;
        box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        position: relative;
    }

    h1 {
        margin-top: 10px;
    }

    p {
        font-style: italic;
        margin-top: 20px;
    }

    /* SLIDESHOW */
    #slideshow {
        width: 100%;
        height: 60vh;
        margin: 20px auto;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        position: relative;
    }

    #slideshow img {
        max-width: 100%;
        max-height: 100%;
        object-fit: contain; /* key fix */
        border-radius: 20px;
        position: absolute;
        opacity: 0;
        transition: opacity 1s ease-in-out;
    }

    #slideshow img.active {
        opacity: 1;
    }

    /* HEARTS */
    .heart {
        position: fixed;
        top: -10px;
        font-size: 24px;
        animation: fall linear infinite;
    }

    @keyframes fall {
        to {
            transform: translateY(110vh);
        }
    }
</style>
</head>

<body>

<div class="container">
    <h1>For Aisha 💖</h1>

    <div id="slideshow">
        <img src="img1.jpeg" class="active">
        <img src="img2.jpeg">
        <img src="img3.jpeg">
        <img src="img4.jpeg">
        <img src="img5.jpeg">
        <img src="img6.jpeg">
        <img src="img7.jpeg">
        <img src="img8.jpeg">
        <img src="img9.jpeg">
        <img src="img10.jpeg">
        <img src="img11.jpeg">
        <img src="img12.jpeg">
        <img src="img13.jpeg">
        <img src="img14.jpeg">
        <img src="img15.jpeg">
        <img src="img16.jpeg">
        <img src="img17.jpeg">
        <img src="img18.jpeg">
        <img src="img19.png">
        <img src="img20.jpeg">
    </div>

    <p>Every moment with you feels like magic... 💖</p>
</div>

<audio id="music" src="music.mp3" loop></audio>

<script>
    // 🎵 MUSIC AUTOPLAY
    const music = document.getElementById("music");

    window.onload = () => {
        music.play().then(() => {
            console.log("Playing");
        }).catch(e => {
            console.log("Blocked:", e);
        });
    };

    // 📸 SLIDESHOW
    const slides = document.querySelectorAll("#slideshow img");
    let index = 0;

    function showNextSlide() {
        slides[index].classList.remove("active");
        index = (index + 1) % slides.length;
        slides[index].classList.add("active");
    }

    setInterval(showNextSlide, 2500);

    // 💖 FLOATING HEARTS
    function createHeart() {
        const heart = document.createElement("div");
        heart.classList.add("heart");
        heart.innerText = "💖";

        heart.style.left = Math.random() * 100 + "vw";
        heart.style.animationDuration = (Math.random() * 3 + 3) + "s";

        document.body.appendChild(heart);

        setTimeout(() => {
            heart.remove();
        }, 6000);
    }

    setInterval(createHeart, 300);
</script>

</body>
</html>
