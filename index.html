<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You 💝</title>

<style>
body {
    margin: 0;
    font-family: 'Georgia', serif;
    background: linear-gradient(135deg, #fbeff5, #ffe3ec);
    overflow: hidden;
}

/* Screens */
.screen {
    position: absolute;
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Button */
.open-btn {
    padding: 16px 28px;
    font-size: 18px;
    border-radius: 30px;
    border: none;
    background: #ff4d88;
    color: white;
    cursor: pointer;
    transition: transform 0.2s;
}
.open-btn:hover {
    transform: scale(1.05);
}

/* Card */
.card {
    display: none;
    background: white;
    padding: 20px;
    border-radius: 20px;
    width: 90%;
    max-width: 400px;
    text-align: center;
    box-shadow: 0 15px 40px rgba(0,0,0,0.2);
    animation: pop 0.8s ease;
}

@keyframes pop {
    from { transform: scale(0.7); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}

/* Slideshow */
.slideshow {
    width: 100%;
    aspect-ratio: 1;
    border-radius: 15px;
    overflow: hidden;
    position: relative;
    margin-top: 15px;
}

.slideshow img {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0;
    transition: opacity 1.5s ease;
}

.slideshow img.active {
    opacity: 1;
}

/* Message typing */
.message {
    margin-top: 15px;
    font-style: italic;
    min-height: 50px;
}

/* Hearts */
.heart {
    position: absolute;
    color: #ff4d88;
    animation: float 6s linear infinite;
}

@keyframes float {
    from { transform: translateY(100vh) scale(0.6); }
    to { transform: translateY(-10vh) scale(1.3); }
}
</style>
</head>

<body>

<!-- START -->
<div id="startScreen" class="screen">
    <button class="open-btn" onclick="openGift()">Tap to open your gift 🎁</button>
</div>

<!-- CARD -->
<div id="cardScreen" class="screen" style="display:none;">
    <div class="card" id="cardBox">
        <h2 id="title"></h2>

        <div class="slideshow" id="slideshow"></div>

        <div class="message" id="message"></div>
    </div>
</div>

<audio id="music" loop></audio>

<script>
/* 🔧 EDIT THESE */
const NAME = "Aisha 💖";
const MUSIC_URL = "music.mp3";

const IMAGES = [
    "img1.jpg",
    "img2.jpg",
    "img3.jpg"
];

const MESSAGE = "Every moment with you feels like magic... 💖";

/* Elements */
const music = document.getElementById("music");
const slideshow = document.getElementById("slideshow");
const messageEl = document.getElementById("message");

let index = 0;

/* OPEN */
function openGift() {
    document.getElementById("startScreen").style.display = "none";
    document.getElementById("cardScreen").style.display = "flex";

    document.getElementById("title").innerText = "For " + NAME;

    setupSlideshow();
    startSlideshow();
    playMusic();
    startHearts();
    typeMessage();

    document.getElementById("cardBox").style.display = "block";
}

/* SLIDESHOW */
function setupSlideshow() {
    IMAGES.forEach((src, i) => {
        const img = document.createElement("img");
        img.src = src;
        if (i === 0) img.classList.add("active");
        slideshow.appendChild(img);
    });
}

function startSlideshow() {
    const imgs = document.querySelectorAll(".slideshow img");

    setInterval(() => {
        imgs[index].classList.remove("active");
        index = (index + 1) % imgs.length;
        imgs[index].classList.add("active");
    }, 3000);
}

/* MUSIC */
function playMusic() {
    music.src = MUSIC_URL;
    music.play().catch(() => console.log("Autoplay blocked"));
}

/* TYPEWRITER */
function typeMessage() {
    let i = 0;
    const speed = 40;

    function typing() {
        if (i < MESSAGE.length) {
            messageEl.innerHTML += MESSAGE.charAt(i);
            i++;
            setTimeout(typing, speed);
        }
    }

    typing();
}

/* HEARTS */
function startHearts() {
    setInterval(() => {
        const heart = document.createElement("div");
        heart.className = "heart";
        heart.innerHTML = "💖";
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.fontSize = (20 + Math.random() * 20) + "px";

        document.body.appendChild(heart);

        setTimeout(() => heart.remove(), 6000);
    }, 300);
}
</script>

</body>
</html>
