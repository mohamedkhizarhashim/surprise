<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Aisha 💖</title>

<style>
body {
    margin: 0;
    font-family: serif;
    background: linear-gradient(to bottom, #ff9eb5, #ffc1cc);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
}

/* START SCREEN */
#startScreen {
    position: absolute;
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
}

button {
    padding: 15px 25px;
    border: none;
    border-radius: 30px;
    background: #ff4d88;
    color: white;
    font-size: 18px;
}

/* CARD */
.container {
    display: none;
    background: rgba(255,255,255,0.95);
    width: 90%;
    max-width: 400px;
    padding: 20px;
    border-radius: 25px;
    text-align: center;
}

/* SLIDESHOW */
#slideshow {
    width: 100%;
    height: 60vh;
    background: #000; /* fills empty space nicely */
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
    overflow: hidden;
    border-radius: 20px;
}

#slideshow img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain; /* SHOW FULL IMAGE */
    position: absolute;
    opacity: 0;
    transition: opacity 2s ease-in-out;
}

#slideshow img.active {
    opacity: 1;
}

/* HEARTS */
.heart {
    position: fixed;
    top: -10px;
    font-size: 24px;
    animation: fall linear infinite;
}

@keyframes fall {
    to {
        transform: translateY(110vh);
    }
}
</style>
</head>

<body>

<!-- START -->
<div id="startScreen">
    <button onclick="startGift()">Tap to open your gift 🎁</button>
</div>

<!-- MAIN -->
<div class="container" id="mainContent">
    <h2>For Aisha 💖</h2>

    <div id="slideshow">
        <img src="img1.jpeg" class="active">
        <img src="img2.jpeg">
        <img src="img3.jpeg">
        <img src="img4.jpeg">
        <img src="img5.jpeg">
        <img src="img6.jpeg">
        <img src="img7.jpeg">
        <img src="img8.jpeg">
        <img src="img9.jpeg">
        <img src="img10.jpeg">
        <img src="img11.jpeg">
        <img src="img12.jpeg">
        <img src="img13.jpeg">
        <img src="img14.jpeg">
        <img src="img15.jpeg">
        <img src="img16.jpeg">
        <img src="img17.jpeg">
        <img src="img18.jpeg">
        <img src="img19.png">
        <img src="img20.jpeg">
    </div>

    <p>Every moment with you feels like magic 💖</p>
</div>

<audio id="music" src="music.mp3" loop></audio>

<script>
const music = document.getElementById("music");
const slides = document.querySelectorAll("#slideshow img");

let index = 0;
const totalDuration = 30000;
const slideDuration = totalDuration / slides.length;

/* START EXPERIENCE */
function startGift() {
    document.getElementById("startScreen").style.display = "none";
    document.getElementById("mainContent").style.display = "block";

    // ✅ Play music AFTER click (fixes iPhone)
    music.play().then(() => {
        console.log("Playing");
    }).catch(e => {
        console.log("Blocked:", e);
    });

    startSlideshow();
    startHearts();
}

/* SLIDESHOW */
function startSlideshow() {
    setInterval(() => {
        slides[index].classList.remove("active");
        index = (index + 1) % slides.length;
        slides[index].classList.add("active");
    }, slideDuration);
}

/* HEARTS */
function startHearts() {
    setInterval(() => {
        const heart = document.createElement("div");
        heart.className = "heart";
        heart.innerText = "💖";
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.animationDuration = (Math.random() * 3 + 3) + "s";

        document.body.appendChild(heart);

        setTimeout(() => heart.remove(), 6000);
    }, 300);
}
</script>

</body>
</html>
