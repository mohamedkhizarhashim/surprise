<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For Aisha 💖</title>

<style>
body {
    margin: 0;
    background: #ffb6c1;
    font-family: serif;
    display: flex;
    justify-content: center;
}

/* Start screen */
#startScreen {
    position: fixed;
    width: 100%;
    height: 100%;
    background: #ffb6c1;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 999;
}

#startBtn {
    padding: 15px 25px;
    font-size: 18px;
    border-radius: 20px;
    border: none;
    background: white;
    cursor: pointer;
}

/* Card */
.card {
    margin: 20px;
    background: #fff0f5;
    border-radius: 25px;
    padding: 20px;
    text-align: center;
    width: 90%;
    max-width: 400px;
}

/* Slideshow box */
.slideshow {
    position: relative;
    width: 100%;
    aspect-ratio: 3 / 4;
    background: black;
    overflow: hidden;
    border-radius: 20px;
}

/* Images (FINAL FIX) */
.slide {
    position: absolute;

    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);

    max-width: 100%;
    max-height: 100%;

    object-fit: contain;

    opacity: 0;
    transition: opacity 2s ease-in-out;
}

.slide.active {
    opacity: 1;
}

/* Hearts */
.heart {
    position: fixed;
    animation: float 10s linear infinite;
    font-size: 22px;
}

@keyframes float {
    0% { transform: translateY(100vh); }
    100% { transform: translateY(-10vh); }
}
</style>
</head>

<body>

<!-- Start Screen -->
<div id="startScreen">
    <button id="startBtn">🎁 Tap to Open Gift</button>
</div>

<!-- Card -->
<div class="card">
    <h1>Amlu 💖</h1>

    <div class="slideshow" id="slideshow"></div>

    <p><i>Every moment with you feels like magic 💖</i></p>
</div>

<!-- Music -->
<audio id="music" src="music.mp3" loop></audio>

<script>
const imageCount = 20;
const slideshow = document.getElementById("slideshow");
const music = document.getElementById("music");

let validImages = [];

/* Load images safely */
function preloadImages() {
    let loaded = 0;

    for (let i = 1; i <= imageCount; i++) {
        let img = new Image();
        img.src = `img${i}.jpeg`;

        img.onload = () => {
            validImages.push(img.src);
            loaded++;
            if (loaded === imageCount) startSlideshow();
        };

        img.onerror = () => {
            console.log("Skipping broken:", img.src);
            loaded++;
            if (loaded === imageCount) startSlideshow();
        };
    }
}

/* Slideshow logic */
function startSlideshow() {

    if (validImages.length === 0) return;

    let slides = [];

    validImages.forEach((src, index) => {
        let img = document.createElement("img");
        img.src = src;
        img.className = "slide";

        if (index === 0) img.classList.add("active");

        slideshow.appendChild(img);
        slides.push(img);
    });

    let current = 0;

    const totalDuration = 30000; // 30 sec
    const interval = totalDuration / slides.length;

    setInterval(() => {
        slides[current].classList.remove("active");

        current = (current + 1) % slides.length;

        slides[current].classList.add("active");
    }, interval);
}

/* Start button */
document.getElementById("startBtn").onclick = () => {
    document.getElementById("startScreen").style.display = "none";

    music.play().catch(e => console.log("Blocked:", e));

    preloadImages();
};

/* Floating hearts */
for (let i = 0; i < 20; i++) {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "💖";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = (5 + Math.random() * 5) + "s";
    document.body.appendChild(heart);
}
</script>

</body>
</html>
