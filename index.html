<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Aisha 💖</title>

<style>
body {
    margin: 0;
    padding: 0;
    font-family: serif;
    background: linear-gradient(to bottom, #ff9eb5, #ffc1cc);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
}

.container {
    background: rgba(255,255,255,0.9);
    width: 90%;
    max-width: 400px;
    padding: 20px;
    border-radius: 25px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
}

/* SLIDESHOW */
#slideshow {
    width: 100%;
    aspect-ratio: 3 / 4;
    margin: 20px auto;
    position: relative;
    overflow: hidden;
    border-radius: 20px;
}

#slideshow img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    position: absolute;
    top: 0;
    left: 0;
    opacity: 0;
    transition: opacity 1.5s ease-in-out;
}

/* ACTIVE IMAGE */
#slideshow img.active {
    opacity: 1;
    animation: zoom 3s ease-in-out;
}

/* ZOOM EFFECT */
@keyframes zoom {
    from { transform: scale(1); }
    to { transform: scale(1.08); }
}

/* HEARTS */
.heart {
    position: fixed;
    top: -10px;
    font-size: 24px;
    animation: fall linear infinite;
    pointer-events: none;
}

@keyframes fall {
    to {
        transform: translateY(110vh);
    }
}
</style>
</head>

<body>

<div class="container">
    <h1>For Aisha 💖</h1>

    <div id="slideshow">
        <img src="img1.jpeg" class="active">
        <img src="img2.jpeg">
        <img src="img3.jpeg">
        <img src="img4.jpeg">
        <img src="img5.jpeg">
        <img src="img6.jpeg">
        <img src="img7.jpeg">
        <img src="img8.jpeg">
        <img src="img9.jpeg">
        <img src="img10.jpeg">
        <img src="img11.jpeg">
        <img src="img12.jpeg">
        <img src="img13.jpeg">
        <img src="img14.jpeg">
        <img src="img15.jpeg">
        <img src="img16.jpeg">
        <img src="img17.jpeg">
        <img src="img18.jpeg">
        <img src="img19.png">
        <img src="img20.jpeg">
    </div>

    <p>Every moment with you feels like magic... 💖</p>
</div>

<audio id="music" src="music.mp3" loop></audio>

<script>
// 🎵 MUSIC
const music = document.getElementById("music");

window.onload = () => {
    music.play().then(() => {
        console.log("Playing");
    }).catch(e => {
        console.log("Blocked:", e);
    });
};

// 📸 SLIDESHOW (SYNC WITH 30s MUSIC)
const slides = document.querySelectorAll("#slideshow img");
let index = 0;

const totalDuration = 30000; // 30 seconds
const slideDuration = totalDuration / slides.length;

function showNextSlide() {
    slides[index].classList.remove("active");
    index = (index + 1) % slides.length;
    slides[index].classList.add("active");
}

setInterval(showNextSlide, slideDuration);

// 💖 HEARTS
function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerText = "💖";

    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = (Math.random() * 3 + 3) + "s";

    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 6000);
}

setInterval(createHeart, 300);
</script>

</body>
</html>
